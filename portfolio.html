<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KmarinEOOD | Marine Technical Supply & Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS RESET & BASE */
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }
        
        body { 
            font-family:'Poppins', sans-serif; 
            color:#333; 
            line-height:1.6; 
            background-color: #001a30;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* BACKGROUND LAYER 1 (FIXED) */
        .main-bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: 
                linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,26,48,0.4) 100%),
                url('https://images.unsplash.com/photo-1524522173746-f628baad3644?q=80&w=2500') no-repeat center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* HEADER & NAVIGATION */
        header {
            position:fixed; top:0; width:100%; z-index:1000;
            background: rgba(0, 32, 63, 0.95); 
            padding: 15px 8%;
            display:flex; 
            justify-content: center; 
            align-items:center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        header nav {
            display: flex;
            gap: 15px;
        }

        /* ОБЩИЕ СТИЛИ ДЛЯ ВСЕХ NAV LINK */
        header nav a { 
            color:white; 
            text-decoration:none; 
            font-weight:600; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            padding: 10px 20px;
            border-radius: 50px; 
            display: inline-block;
            border: 1px solid transparent;
            will-change: transform, background, box-shadow;
        }

        /* ЭФФЕКТ НАВЕДЕНИЯ ДЛЯ ВСЕХ NAV LINK */
        header nav a:hover { 
            color: white;
            background: rgba(0, 170, 255, 0.2);
            border-color: rgba(0, 170, 255, 0.5);
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0, 170, 255, 0.3); 
        }

        /* HERO SECTION */
        .hero {
            height:100vh; display:flex; align-items:center; justify-content:center; 
            text-align:center; color:white; position: relative; z-index: 1;
        }
        .hero-content h1 { font-size: 70px; text-transform: uppercase; text-shadow: 0 4px 15px rgba(0,0,0,0.6); line-height: 1.1; }
        .hero-content p { font-size: 24px; font-weight: 300; text-shadow: 0 2px 8px rgba(0,0,0,0.5); margin-top: 10px; }

        /* SECTIONS COMMON */
        section { padding: 100px 10%; position: relative; z-index: 1; width: 100%; }
        .content-section { background: rgba(255, 255, 255, 0.95); width: 100%; overflow: hidden; }
        h2 { text-align:center; margin-bottom:50px; font-size:36px; color:#002b4e; text-transform: uppercase; letter-spacing: 2px; }
        h2::after { content: ''; display: block; width: 80px; height: 4px; background: #00aaff; margin: 15px auto; }

        /* GRID & CARDS */
        .grid { 
            display:grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            width: 100%;
        }
        .card { 
            background: white; padding: 40px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,43,78,0.06); transition: 0.3s ease;
            opacity: 0; transform: translateY(20px); border: 1px solid #eee;
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover { transform: translateY(-10px); border-bottom: 5px solid #00aaff; box-shadow: 0 15px 35px rgba(0,43,78,0.12); }
        .card h3 { color: #002b4e; margin-bottom: 15px; font-size: 22px; }

        /* LAYER 2 BACKGROUND (PRODUCTS FIXED) */
        #products {
            background: 
                linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,26,48,0.4) 100%),
                url('https://images.unsplash.com/photo-1494412519320-aa613dfb7738?q=80&w=2500') no-repeat center;
            background-size: cover;
            background-attachment: fixed;
            background-color: #050a0f; 
        }
        #products h2 { color: white; }

        /* CONTACT SECTION */
        .contact { background: rgba(0, 26, 48, 0.98); color:white; text-align:center; overflow: hidden; }
        .contact h2 { color: white; }
        
        form { width: 100%; max-width:700px; margin: 40px auto; display:grid; gap:15px; }
        
        input, textarea { 
            width: 100%; padding:18px; border-radius:8px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); color: white; font-family: inherit; font-size: 16px; transition: all 0.3s ease;
        }

        input:hover, textarea:hover, input:focus, textarea:focus { 
            border-color: #00aaff; background: rgba(255, 255, 255, 0.1); 
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.3); transform: translateY(-2px); outline: none;
        }

        button { 
            width: 100%; padding:18px; border:none; background:#00aaff; color:white; font-weight:700; 
            cursor:pointer; border-radius:8px; transition:0.3s; font-size: 18px; text-transform: uppercase;
        }
        button:hover { background:white; color:#002b4e; transform: scale(1.02); }

        .email-link { color: #00aaff; text-decoration: none; transition: 0.3s; border-bottom: 1px solid transparent; }
        .email-link:hover { border-bottom: 1px solid #00aaff; }

        .footer-logo { 
            height: 150px; 
            width: auto; 
            max-width: 100%; 
            display: block; 
            margin: 30px auto 0; 
            object-fit: contain; 
        }

        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px; background-color: #25d366;
            color: white; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 2000; transition: 0.3s;
            will-change: transform;
        }
        .whatsapp-float:hover { transform: scale(1.1); background-color: #128c7e; }
        .whatsapp-float svg { width: 35px; height: 35px; fill: white; }

        .whatsapp-inline {
            display: inline-flex; align-items: center; vertical-align: middle;
            margin-left: 10px; text-decoration: none; color: #25d366; font-weight: 600;
        }
        .whatsapp-inline svg { width: 20px; height: 20px; fill: #25d366; margin-right: 5px; }

        footer { text-align:center; padding:40px; background:#04070a; color:#777; font-size: 14px; position: relative; z-index: 2; }

        /* MOBILE OPTIMIZATION */
        @media(max-width:768px){
            .main-bg-layer, #products { 
                background-attachment: scroll !important; 
                background-size: cover !important;
            }
            .hero-content h1 { font-size: 34px; }
            .hero-content p { font-size: 18px; }
            h2 { font-size: 28px; }
            header { padding: 10px; }
            header nav { gap: 5px; flex-wrap: wrap; justify-content: center; }
            header nav a { padding: 8px 12px; font-size: 13px; }
            
            .grid { 
                grid-template-columns: 1fr !important; 
                gap: 20px;
            }
            
            section { padding: 60px 5%; }
            .whatsapp-float { width: 50px; height: 50px; bottom: 20px; right: 20px; }
        }
    </style>
</head>
